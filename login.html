<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập — Đô Thị Vàng</title>
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body class="login-page">
    <div class="login-shell">
      <div class="login-card">
        <div class="login-brand">
          <div class="logo-mark">ĐV</div>
          <div>
            <div class="login-brand-name">Đô Thị Vàng</div>
            <div class="login-brand-sub">Hệ thống quản trị</div>
          </div>
        </div>

        <h1 class="login-title">Đăng nhập</h1>
        <p class="login-desc">Nhập tài khoản quản trị để tiếp tục</p>

        <div class="login-alert" id="loginAlert" hidden></div>

        <form id="loginForm" autocomplete="on" action="index.html" method="get">
          <div class="form-group">
            <label class="form-label" for="username"
              ><span class="required">*</span>Tài khoản</label
            >
            <input
              class="form-control"
              type="text"
              id="username"
              name="username"
              placeholder="admin"
              autofocus
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label" for="password"
              ><span class="required">*</span>Mật khẩu</label
            >
            <input
              class="form-control"
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
            />
          </div>
          <button
            class="btn btn-primary btn-lg btn-block"
            type="submit"
            id="loginBtn"
          >
            Đăng nhập
          </button>
        </form>

        <p class="login-hint">
          Demo: tài khoản <code>admin</code> / mật khẩu <code>admin</code>
        </p>
      </div>
    </div>

    <!-- Auth inline: không phụ thuộc file ngoài (tránh lỗi deploy static.app) -->
    <script>
      (function () {
        var AUTH_KEY = "dtv-admin-session";
        var DEMO = { username: "admin", password: "admin" };

        function getRoot() {
          var path = location.pathname;
          if (path.indexOf("/pages/") !== -1) {
            return path.replace(/\/pages\/[^/]*$/, "/");
          }
          var i = path.lastIndexOf("/");
          return i >= 0 ? path.slice(0, i + 1) : "/";
        }

        function getSession() {
          try {
            var raw = localStorage.getItem(AUTH_KEY);
            return raw ? JSON.parse(raw) : null;
          } catch (e) {
            return null;
          }
        }

        function isLoggedIn() {
          var s = getSession();
          return !!(s && s.username);
        }

        function goHome() {
          var params = new URLSearchParams(location.search);
          var next = params.get("next");
          var safe =
            next && next.charAt(0) === "/" && next.indexOf("//") !== 0
              ? next
              : null;
          location.replace(safe || getRoot() + "index.html");
        }

        function doLogin(username, password) {
          var u = String(username || "").replace(/^\s+|\s+$/g, "");
          var p = String(password || "");
          if (u === DEMO.username && p === DEMO.password) {
            localStorage.setItem(
              AUTH_KEY,
              JSON.stringify({
                username: u,
                name: "Nguyễn Quản Trị",
                role: "Quản trị viên",
                at: Date.now(),
              }),
            );
            return true;
          }
          return false;
        }

        if (isLoggedIn()) {
          goHome();
          return;
        }

        var form = document.getElementById("loginForm");
        var alertEl = document.getElementById("loginAlert");
        var btn = document.getElementById("loginBtn");

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          alertEl.hidden = true;
          btn.disabled = true;

          if (
            !doLogin(
              document.getElementById("username").value,
              document.getElementById("password").value,
            )
          ) {
            alertEl.textContent = "Tài khoản hoặc mật khẩu không đúng.";
            alertEl.hidden = false;
            btn.disabled = false;
            document.getElementById("password").focus();
            document.getElementById("password").select();
            return;
          }

          goHome();
        });
      })();
    </script>
  </body>
</html>
