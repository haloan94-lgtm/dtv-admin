<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết khách hàng — Đô Thị Vàng</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={corePlugins:{preflight:false}}</script>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
  <div id="page-root" style="display:none">
    <div class="page-header">
      <div>
        <h1 class="page-title" id="pageTitle">Chi tiết đại lý</h1>
        <p class="page-desc" id="pageDesc"></p>
      </div>
      <div class="page-actions">
        <button class="btn btn-default" onclick="history.back()">← Quay lại</button>
        <button class="btn btn-primary" onclick="DTV.toast('Đã lưu','Cập nhật thông tin thành công')">Lưu thay đổi</button>
      </div>
    </div>

    <div class="grid grid-3 mb-24" id="statRow"></div>

    <div class="card">
      <div class="tabs" id="detailTabs">
        <button class="tab-item active" data-tab="info">Thông tin</button>
        <button class="tab-item" data-tab="orders">Lịch sử đơn hàng</button>
        <button class="tab-item" data-tab="payments">Thanh toán</button>
        <button class="tab-item" data-tab="favorites">Sản phẩm yêu thích</button>
        <button class="tab-item" data-tab="addresses">Địa chỉ</button>
        <button class="tab-item" data-tab="notes">Ghi chú</button>
      </div>
      <div class="card-body">
        <div class="tab-panel active" data-panel="info" id="panelInfo"></div>
        <div class="tab-panel" data-panel="orders" id="panelOrders"></div>
        <div class="tab-panel" data-panel="payments" id="panelPayments"></div>
        <div class="tab-panel" data-panel="favorites" id="panelFavorites"></div>
        <div class="tab-panel" data-panel="addresses" id="panelAddresses"></div>
        <div class="tab-panel" data-panel="notes" id="panelNotes"></div>
      </div>
    </div>
  </div>

  <script src="../assets/js/mock-data.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const customer = DTV.customers.find(c => c.id === params.get("id")) || DTV.customers[0];

    DTV.renderLayout({
      active: "customers",
      breadcrumb: [{ label: "Khách hàng", href: "customers.html" }, { label: customer.name }],
      title: customer.name
    });

    document.getElementById("pageTitle").textContent = customer.name;
    document.getElementById("pageDesc").innerHTML = `${customer.id} · ${DTV.tag(customer.tier)} · ${DTV.tag(customer.status)}`;

    document.getElementById("statRow").innerHTML = [
      { label: "Tổng chi tiêu", value: DTV.formatMoney(customer.totalSpent) },
      { label: "Công nợ", value: DTV.formatMoney(customer.debt) },
      { label: "Hạn mức tín dụng", value: DTV.formatMoney(customer.creditLimit) },
    ].map(s => `<div class="stat-card"><div class="stat-label">${s.label}</div><div class="stat-value" style="font-size:20px">${s.value}</div></div>`).join("");

    document.getElementById("panelInfo").innerHTML = `
      <div class="desc-list">
        <div class="desc-item"><div class="desc-label">Mã khách hàng</div><div class="desc-value">${customer.id}</div></div>
        <div class="desc-item"><div class="desc-label">Người liên hệ</div><div class="desc-value">${customer.contact}</div></div>
        <div class="desc-item"><div class="desc-label">Số điện thoại</div><div class="desc-value">${customer.phone}</div></div>
        <div class="desc-item"><div class="desc-label">Email</div><div class="desc-value">${customer.email}</div></div>
        <div class="desc-item"><div class="desc-label">Thành phố</div><div class="desc-value">${customer.city}</div></div>
        <div class="desc-item"><div class="desc-label">Quận/Huyện</div><div class="desc-value">${customer.district}</div></div>
        <div class="desc-item"><div class="desc-label">Địa chỉ</div><div class="desc-value">${customer.address}</div></div>
        <div class="desc-item"><div class="desc-label">Hạng</div><div class="desc-value">${DTV.tag(customer.tier)}</div></div>
        <div class="desc-item"><div class="desc-label">Số đơn hàng</div><div class="desc-value">${customer.orders}</div></div>
        <div class="desc-item"><div class="desc-label">Ngày tham gia</div><div class="desc-value">${DTV.formatDate(customer.joined)}</div></div>
        <div class="desc-item"><div class="desc-label">Trạng thái</div><div class="desc-value">${DTV.tag(customer.status)}</div></div>
        <div class="desc-item"><div class="desc-label">Công nợ / Hạn mức</div><div class="desc-value">${Math.round(customer.debt / customer.creditLimit * 100)}%</div></div>
      </div>
      <div class="mt-24">
        <div class="form-label mb-16">Sử dụng hạn mức</div>
        <div class="progress" style="height:10px"><div class="progress-bar ${customer.debt / customer.creditLimit > 0.7 ? "error" : ""}" style="width:${Math.min(100, customer.debt / customer.creditLimit * 100)}%"></div></div>
      </div>`;

    const orders = DTV.orders.filter(o => o.customerId === customer.id);
    document.getElementById("panelOrders").innerHTML = orders.length ? `
      <table class="data-table">
        <thead><tr><th>Mã đơn</th><th>Ngày</th><th>SP</th><th>Tổng</th><th>Thanh toán</th><th>Trạng thái</th></tr></thead>
        <tbody>${orders.map(o => `
          <tr>
            <td><a href="order-detail.html?id=${o.id}">${o.id}</a></td>
            <td>${DTV.formatDate(o.createdAt)}</td>
            <td>${o.items}</td>
            <td class="cell-money">${DTV.formatMoney(o.total)}</td>
            <td>${DTV.tag(o.payment)}</td>
            <td>${DTV.tag(o.status)}</td>
          </tr>`).join("")}</tbody>
      </table>` : `<div class="empty-state"><div class="empty-state-title">Chưa có đơn hàng</div></div>`;

    const payments = DTV.payments.filter(p => p.customer === customer.name);
    document.getElementById("panelPayments").innerHTML = payments.length ? `
      <table class="data-table">
        <thead><tr><th>Mã TT</th><th>Số tiền</th><th>Phương thức</th><th>Đơn hàng</th><th>Ngày</th><th>Trạng thái</th></tr></thead>
        <tbody>${payments.map(p => `
          <tr>
            <td>${p.id}</td>
            <td class="cell-money">${DTV.formatMoney(p.amount)}</td>
            <td>${p.method}</td>
            <td>${p.orderId}</td>
            <td>${DTV.formatDate(p.date)}</td>
            <td>${DTV.tag(p.status)}</td>
          </tr>`).join("")}</tbody>
      </table>` : `<div class="empty-state"><div class="empty-state-title">Chưa có thanh toán</div></div>`;

    document.getElementById("panelFavorites").innerHTML = `
      <table class="data-table">
        <thead><tr><th>Sản phẩm</th><th>SKU</th><th>Đã mua</th><th>Giá</th></tr></thead>
        <tbody>${DTV.products.slice(0, 5).map(p => `
          <tr>
            <td class="fw-500">${p.name}</td>
            <td class="cell-muted">${p.sku}</td>
            <td>${Math.floor(Math.random() * 20) + 1}</td>
            <td class="cell-money">${DTV.formatMoney(p.price)}</td>
          </tr>`).join("")}</tbody>
      </table>`;

    document.getElementById("panelAddresses").innerHTML = `
      <div class="card" style="border:1px solid var(--border);margin-bottom:12px">
        <div class="card-body">
          <div class="flex-between mb-16">
            <span class="fw-500">Địa chỉ giao hàng chính</span>
            <span class="tag tag-gold">Mặc định</span>
          </div>
          <div>${customer.address}, ${customer.district}, ${customer.city}</div>
          <div class="text-muted mt-8">${customer.contact} · ${customer.phone}</div>
        </div>
      </div>
      <button class="btn btn-dashed btn-block">+ Thêm địa chỉ</button>`;

    document.getElementById("panelNotes").innerHTML = `
      <div class="activity-item">
        <div class="avatar avatar-sm">CS</div>
        <div class="activity-content">
          <div class="activity-text"><strong>Đặng Văn CSKH</strong> — Khách hàng VIP, ưu tiên giao hàng nhanh. Thường đặt nhẫn cưới số lượng lớn vào cuối tuần.</div>
          <div class="activity-time">12/07/2026 14:30</div>
        </div>
      </div>
      <div class="activity-item">
        <div class="avatar avatar-sm">SL</div>
        <div class="activity-content">
          <div class="activity-text"><strong>Trần Thị Kinh Doanh</strong> — Đã thỏa thuận chiết khấu thêm 1% cho đơn trên 100 triệu trong Q3.</div>
          <div class="activity-time">05/07/2026 10:15</div>
        </div>
      </div>
      <div class="form-group mt-24">
        <label class="form-label">Thêm ghi chú</label>
        <textarea class="form-control" rows="3" placeholder="Nhập ghi chú..."></textarea>
      </div>
      <button class="btn btn-primary" onclick="DTV.toast('Đã thêm','Ghi chú mới đã được lưu')">Lưu ghi chú</button>`;

    DTV.initTabs(document.querySelector(".card"));
  </script>
</body>
</html>
