<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vai trò — Đô Thị Vàng</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={corePlugins:{preflight:false}}</script>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
  <div id="page-root" style="display:none">
    <div class="page-header">
      <div>
        <h1 class="page-title">Vai trò & Phân quyền</h1>
        <p class="page-desc">Quản lý vai trò và quyền truy cập hệ thống</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="DTV.openDrawer('drawerRole')">+ Tạo vai trò</button>
      </div>
    </div>

    <div class="grid grid-2">
      <div class="card">
        <div class="card-header"><h3 class="card-title">Danh sách vai trò</h3></div>
        <div class="card-body no-padding">
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>Vai trò</th><th>Người dùng</th><th>Mô tả</th><th>Thao tác</th></tr></thead>
              <tbody id="roleTable"></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h3 class="card-title" id="permTitle">Phân quyền: Quản trị viên</h3></div>
        <div class="card-body" id="permPanel"></div>
      </div>
    </div>
  </div>

  <div class="drawer" id="drawerRole">
    <div class="drawer-header">
      <h3 class="drawer-title">Tạo vai trò mới</h3>
      <button class="modal-close" onclick="DTV.closeDrawer('drawerRole')">×</button>
    </div>
    <div class="drawer-body">
      <div class="form-group"><label class="form-label"><span class="required">*</span>Tên vai trò</label><input class="form-control"></div>
      <div class="form-group"><label class="form-label">Mô tả</label><textarea class="form-control" rows="2"></textarea></div>
      <div class="form-group"><label class="form-label">Quyền truy cập</label>
        <div id="permCheckboxes"></div>
      </div>
    </div>
    <div class="drawer-footer">
      <button class="btn btn-default" onclick="DTV.closeDrawer('drawerRole')">Hủy</button>
      <button class="btn btn-primary" onclick="DTV.closeDrawer('drawerRole');DTV.toast('Thành công','Đã tạo vai trò mới')">Lưu</button>
    </div>
  </div>

  <script src="../assets/js/mock-data.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script>
    DTV.renderLayout({ active: "roles", breadcrumb: [{ label: "Vai trò" }], title: "Vai trò" });
    document.querySelector("#drawerRole .modal-close").innerHTML = DTV.ICONS.close;

    const modules = [
      { group: "Kinh doanh", items: ["Khách hàng", "Sản phẩm", "Đơn hàng", "Báo cáo"] },
      { group: "Vận hành", items: ["Sản xuất", "Kho hàng"] },
      { group: "Tài chính", items: ["Bảng giá", "Giá vàng", "Công nợ", "Thanh toán"] },
      { group: "Nội dung", items: ["Tin tức", "Nội dung web"] },
      { group: "Hệ thống", items: ["Người dùng", "Vai trò", "Cài đặt"] },
    ];

    const permActions = ["Xem", "Tạo", "Sửa", "Xóa"];

    document.getElementById("permCheckboxes").innerHTML = modules.map(m => `
      <div style="margin-bottom:16px">
        <div class="fw-500 mb-8" style="font-size:13px">${m.group}</div>
        ${m.items.map(item => `<label style="display:block;margin-bottom:4px;font-size:13px"><input type="checkbox"> ${item}</label>`).join("")}
      </div>`).join("");

    let selectedRole = DTV.roles[0];

    function renderPermissions(role) {
      selectedRole = role;
      document.getElementById("permTitle").textContent = "Phân quyền: " + role.name;
      const isAdmin = role.name === "Quản trị viên";
      document.getElementById("permPanel").innerHTML = modules.map(m => `
        <div style="margin-bottom:20px">
          <div class="fw-500 mb-8">${m.group}</div>
          <table class="data-table" style="font-size:13px">
            <thead><tr><th>Module</th>${permActions.map(a => `<th style="text-align:center">${a}</th>`).join("")}</tr></thead>
            <tbody>${m.items.map(item => {
              const hasPerm = isAdmin || role.permissions.includes(item.split(" ")[0]) || role.permissions === "Toàn quyền";
              return `<tr>
                <td>${item}</td>
                ${permActions.map(() => `<td style="text-align:center"><input type="checkbox" ${hasPerm ? "checked" : ""} ${isAdmin ? "disabled" : ""}></td>`).join("")}
              </tr>`;
            }).join("")}</tbody>
          </table>
        </div>`).join("") +
        `<button class="btn btn-primary btn-sm" onclick="DTV.toast('Đã lưu','Cập nhật phân quyền ' + '${role.name}')">Lưu phân quyền</button>`;
    }

    document.getElementById("roleTable").innerHTML = DTV.roles.map((r, i) => `
      <tr style="cursor:pointer" onclick="renderPermissions(DTV.roles[${i}])">
        <td>
          <span class="fw-500">${r.name}</span>
          <div class="cell-muted" style="font-size:11px">${r.id}</div>
        </td>
        <td>${r.users}</td>
        <td class="cell-muted" style="font-size:12px">${r.description}</td>
        <td class="actions">
          <button class="btn btn-link btn-sm" onclick="event.stopPropagation();renderPermissions(DTV.roles[${i}])">Quyền</button>
          ${r.name !== "Quản trị viên" ? `<button class="btn btn-link btn-sm" onclick="event.stopPropagation();DTV.openDrawer('drawerRole')">Sửa</button>` : ""}
        </td>
      </tr>`).join("");

    renderPermissions(DTV.roles[0]);
  </script>
</body>
</html>
